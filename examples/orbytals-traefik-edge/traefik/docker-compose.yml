# Traefik edge (orbytals.com + hermesapp.live). Run from this directory:
#   docker compose up -d
#
# Prerequisites: external Docker network (default name "proxy"; or run scripts/orbytals-install.sh).
# Attach backends (Synapse, Mailcow nginx, etc.)
# to the same network so Docker provider labels and file-provider upstream names resolve.
#
# ACME: default host path /opt/traefik/acme/acme.json (created by server bootstrap). Override:
#   ACME_JSON_HOST_PATH=/opt/orbytals/edge/traefik/acme/acme.json docker compose up -d

services:
  traefik:
    image: docker.io/library/traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-postmaster@orbytals.com}
      TRAEFIK_PROVIDERS_DOCKER_NETWORK: ${TRAEFIK_PUBLIC_NETWORK:-proxy}
      # Let's Encrypt production by default; override TRAEFIK_ACME_CASERVER in .env for staging only.
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_CASERVER: ${TRAEFIK_ACME_CASERVER:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:18080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ${ACME_JSON_HOST_PATH:-/opt/traefik/acme/acme.json}:/acme.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - traefik_public

networks:
  traefik_public:
    name: ${TRAEFIK_PUBLIC_NETWORK:-proxy}
    external: true
