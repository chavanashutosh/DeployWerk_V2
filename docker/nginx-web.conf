server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API (browser uses same-origin /api/...; VITE_API_URL unset in production build)
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Isotope Mail (client UI)
    #
    # Isotope’s static client is normally hosted at `/` and expects its backend at `/api/`.
    # Since DeployWerk already uses `/api/`, we host Isotope under `/mail/` and rewrite
    # absolute `/api/` references to `/mail-api/` in HTML/JS responses.
    location /mail/ {
        proxy_pass http://isotope-client:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ensure responses are not gzipped so sub_filter can operate.
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter '/api/' '/mail-api/';
        sub_filter "\"/api/" "\"/mail-api/";
        sub_filter "'/api/" "'/mail-api/";
        sub_filter "=/api/" "=/mail-api/";
        sub_filter_types text/html application/javascript text/javascript application/json;
    }

    # Isotope Mail (server API). In Isotope’s recommended setup, the reverse-proxy strips
    # `/api/` before forwarding to the server. We do the equivalent by mounting at /mail-api.
    location /mail-api/ {
        proxy_pass http://isotope-server:9010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
